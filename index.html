<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ítems cargados a catálogos SWE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>*{box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;margin:0;padding:20px;background:#fafaf0;color:#2d2d2d}.container{max-width:980px;margin:0 auto}h1{margin-bottom:6px;font-size:1.5rem;font-weight:600}.sub{color:#6b6b6b;font-size:.9rem;margin-bottom:16px}.tabs{display:flex;gap:10px;margin-bottom:20px}.tabs button{padding:10px 20px;border:1px solid #e0e0dc;background:#fff;color:#6b6b6b;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:500}.tabs button.active{background:#FFE600;color:#1a1a1a;border-color:#FFE600}.hint{color:#6b6b6b;font-size:.85rem;margin:-8px 0 16px 0}.chart-wrap{background:#fff;border:1px solid #e0e0dc;border-radius:12px;padding:20px;min-height:360px;position:relative}.footer{margin-top:20px;color:#6b6b6b;font-size:.8rem}</style>
    </head><body><div class="container">
    <h1>Ítems cargados a catálogos SWE</h1>
    <p class="sub">Sellers que alguna vez se suscribieron a SWE. Actualización diaria.</p>
    <div class="tabs"><button id="btn-month" class="active">Visión mensual</button><button id="btn-day">Visión diaria</button></div>
    <p class="hint" id="hint">Evolución mes a mes.</p>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <p class="footer">Última actualización: 2026-03-04 14:06 UTC</p>
    </div>
    <script>
    (function(){
      var lm=[],vm=[],ld=[],vd=[];
      var ctx=document.getElementById('chart').getContext('2d');
      var chart=new Chart(ctx,{type:'line',data:{labels:lm,datasets:[{label:'Ítems cargados',data:vm,borderColor:'#FFE600',backgroundColor:'rgba(255,230,0,0.2)',borderWidth:2,fill:true,tension:0.2,pointRadius:4,pointBackgroundColor:'#FFE600'}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y.toLocaleString('es')+' ítems';}}}  },scales:{x:{grid:{color:'#e0e0dc'},ticks:{maxRotation:45,autoSkip:false}},y:{beginAtZero:true,grid:{color:'#e0e0dc'}}}}  });
      function setView(v){
        chart.data.labels=v==='day'?ld:lm;
        chart.data.datasets[0].data=v==='day'?vd:vm;
        document.getElementById('btn-day').classList.toggle('active',v==='day');
        document.getElementById('btn-month').classList.toggle('active',v==='month');
        document.getElementById('hint').textContent=v==='day'?'Promedio por día del mes (todos los 1ros, 2dos, … 31).':'Evolución mes a mes.';
        chart.update();
      }
      document.getElementById('btn-day').addEventListener('click',function(){setView('day');});
      document.getElementById('btn-month').addEventListener('click',function(){setView('month');});
    })();
    </script></body></html>
