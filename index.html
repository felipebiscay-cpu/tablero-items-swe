<!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Ítems cargados a catálogos SWE</title>
      <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: #0f1419; color: #e6edf3; }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { color: #58a6ff; margin-bottom: 8px; font-size: 1.5rem; }
        .sub { color: #8b949e; font-size: 0.9rem; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tabs button { padding: 8px 16px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .tabs button:hover { background: #30363d; }
        .tabs button.active { background: #238636; color: #fff; border-color: #238636; }
        .table-wrap { overflow-x: auto; border: 1px solid #30363d; border-radius: 12px; background: #161b22; }
        table { width: 100%; border-collapse: collapse; min-width: 320px; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #21262d; }
        th { background: #21262d; color: #8b949e; font-weight: 600; font-size: 0.85rem; }
        td.num { text-align: right; font-variant-numeric: tabular-nums; }
        tr:hover { background: #21262d; }
        .footer { margin-top: 24px; color: #8b949e; font-size: 0.8rem; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>Ítems cargados a catálogos SWE</h1>
        <p class="sub">Sellers que alguna vez se suscribieron a SWE. Actualización diaria.</p>
    
        <div class="table-wrap">
          <table id="table-day" style="display: none;">
            <thead><tr><th>Fecha</th><th class="num">Ítems cargados</th><th class="num">Sellers</th><th class="num">Acumulado</th></tr></thead>
            <tbody>
    <tr><td colspan="4" style="padding:12px;color:#8b949e;">Sin datos para este periodo.</td></tr>
            </tbody>
          </table>
          <table id="table-month" style="display: table;">
            <thead><tr><th>Mes</th><th class="num">Ítems cargados</th><th class="num">Sellers</th><th class="num">Acumulado</th></tr></thead>
            <tbody>
    <tr><td>-</td><td class="num">0</td><td class="num">–</td><td class="num">0</td></tr>
            </tbody>
          </table>
        </div>
        <p class="footer">Última actualización: 2026-03-03 22:12 UTC</p>
      </div>
    
    </body>
    </html>
